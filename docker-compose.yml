services:
  mongodb:
    image: mongo:3.4
    container_name: cspl-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  mysql:
    image: mysql:5.7
    container_name: cspl-mysql
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./db/seeds/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  seed:
    build:
      context: ./db/seeds
    container_name: cspl-seed
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./db/seeds:/seeds:ro
    env_file:
      - .env
    environment:
      MONGO_HOST: ${MONGODB_HOST}
      MONGO_PORT: ${MONGODB_PORT}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      SEED_DATA: ${SEED_DATA:-true}
    restart: "no"

  server:
    build:
      context: ./SERVER/ccms
    container_name: cspl-server
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
      - "${NETTY_PORT}:${NETTY_PORT}"
    env_file:
      - .env
    environment:
      SPRING_DATA_MONGODB_HOST: ${MONGODB_HOST}
      SPRING_DATA_MONGODB_PORT: ${MONGODB_PORT}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      SERVER_LOG_DIR: ${SERVER_LOG_DIR}
    depends_on:
      mongodb:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  ccms_ui:
    build:
      context: ./CCMS_UI/STARTUP/ccms_ui
    container_name: cspl-ccms-ui
    ports:
      - "${TOMCAT_PORT}:${TOMCAT_PORT}"
    volumes:
      - ./data/dontdelete:/home/data/dontdelete
    env_file:
      - .env
    environment:
      CATALINA_OPTS: "-Dccms.server.host=${CCMS_SERVER_HOST} -Dmongodb.host=${MONGODB_HOST} -Dmongodb.port=${MONGODB_PORT} -Dmongodb.database=${MONGODB_DATABASE} -Dmysql.database=${MYSQL_DATABASE} -Dmysql.username=root -Dmysql.password=${MYSQL_ROOT_PASSWORD} -Dserver.port=${SERVER_PORT} -Dbackend.http.port=${SERVER_PORT} -Dbackend.http.context=${SERVER_CONTEXT_PATH}"
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
      server:
        condition: service_started
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
    container_name: cspl-nginx
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      LETSENCRYPT_LIVE_DIR: ${LETSENCRYPT_LIVE_DIR}
    volumes:
      - letsencrypt_data:/etc/letsencrypt
    depends_on:
      - ccms_ui
    restart: unless-stopped

volumes:
  letsencrypt_data:
